<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación - Coffee & Code</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <div class="circulo-logo"></div>
        </div>
        <nav class="menu-nav">
            <a href="#">Inicio</a>
            <a href="#">Café</a>
            <a href="#">Tortas</a>
            <a href="#">Panadería</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Cafes R A P</h1>
                <button class="btn-hero">Inscribete ahora</button>
            </div>
        </section>

        <section class="contenedor-productos">
            <article class="tarjeta cafe">
                <h3>Café</h3>
                <div class="caja-foto">Imagen</div>
                <button class="btn-comprar">Comprar</button>
            </article>

            <article class="tarjeta torta">
                <h3>Tortas</h3>
                <div class="caja-foto">Imagen</div>
                <button class="btn-comprar">Comprar</button>
            </article>

            <article class="tarjeta panaderia">
                <h3>Panadería</h3>
                <div class="caja-foto">Imagen</div>
                <button class="btn-comprar">Comprar</button>
            </article>
        </section>
    </main>

    <footer>
        <div class="footer-info">
            <p>Imagen logo de café</p>
        </div>
        <div class="redes">
            <div class="footer-item"></div>
            <div class="footer-item"></div>
            <div class="footer-item"></div>
        </div>
    </footer>
</body>
</html>
